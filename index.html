<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BVN · Painel de Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
select option{background:#1e293b}
input::placeholder{color:#475569}
tr:hover td{background:#1a2942!important}
button{font-family:'Plus Jakarta Sans',sans-serif}
.mono{font-family:'JetBrains Mono',monospace;letter-spacing:-0.3px}

/* Upload */
#upload-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px}
.drop-zone{width:100%;max-width:520px;border:2px dashed #334155;border-radius:18px;padding:40px 32px;text-align:center;cursor:pointer;transition:all .2s;background:#1e293b;margin-bottom:10px}
.drop-zone.drag{border-color:#f59e0b;background:rgba(245,158,11,.06)}
.drop-zone.has-file{border-color:#f59e0b;background:rgba(245,158,11,.06)}
.drop-csv{width:100%;max-width:520px;border:1.5px dashed #1e3a5f;border-radius:12px;padding:14px 22px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;background:#131e2e;margin-bottom:20px}
.drop-csv.drag{border-color:#60a5fa;background:rgba(96,165,250,.06)}
.drop-csv.has-file{border-color:#22c55e;background:rgba(34,197,94,.05)}
.btn-load{width:100%;max-width:520px;padding:14px;border-radius:12px;font-size:15px;font-weight:800;border:none;margin-bottom:10px;transition:all .2s;background:#1e293b;color:#334155;cursor:not-allowed;letter-spacing:.3px}
.btn-load.ready{background:#f59e0b;color:#0f172a;cursor:pointer}
.msg-ok{max-width:520px;width:100%;background:rgba(34,197,94,.08);border:1px solid #22c55e;border-radius:10px;padding:10px 16px;color:#22c55e;font-size:13px;margin-bottom:10px}
.msg-err{max-width:520px;width:100%;background:#1e293b;border:1px solid #ef4444;border-radius:10px;padding:10px 16px;color:#ef4444;font-size:13px;margin-bottom:10px}
.divider{display:flex;align-items:center;gap:10px;max-width:520px;width:100%;margin:8px 0 12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1e293b}
.btn-seed{background:transparent;border:1px solid #1e293b;border-radius:10px;padding:11px 28px;color:#475569;font-size:13px;font-weight:600;cursor:pointer;max-width:520px;width:100%}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bar{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
.spinner{animation:pulse 1.5s infinite}
.progress-bar{height:3px;border-radius:2px;background:#334155;overflow:hidden;margin-top:16px}
.progress-bar-inner{height:100%;width:55%;background:#f59e0b;border-radius:2px;animation:bar 1.4s ease-in-out infinite}

/* Dashboard */
#dash-screen{display:none;flex-direction:column;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid #1e293b;padding:14px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px;flex-wrap:wrap;position:relative}
.hdr-title{font-size:15px;font-weight:800;color:#f8fafc;letter-spacing:-.5px}
.hdr-sub{font-size:11px;color:#475569;margin-top:2px}
.nav-btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#94a3b8;transition:all .15s}
.nav-btn.active{background:#c0182a;color:#fff}
.btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#f8fafc;background:#334155;transition:all .15s}
.btn.danger{background:#ef4444}
.btn.primary{background:#f59e0b;color:#0f172a}
.btn:hover{opacity:.85}

/* User chips bar */
.user-bar{background:#0f172a;border-bottom:1px solid #1e293b;padding:5px 26px;display:flex;flex-direction:row;align-items:center;gap:6px;flex-wrap:wrap}
.chip{padding:3px 11px;border-radius:20px;border:1.5px solid #334155;background:transparent;color:#94a3b8;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.chip.active-all{border-color:#c0182a;background:#c0182a;color:#fff}
.chip.active-user{border-color:#60a5fa;background:#1d4ed8;color:#fff}
.chip.active-none{border-color:#94a3b8;background:#334155;color:#f1f5f9}
.chip.partial{border-color:#f59e0b;background:rgba(245,158,11,.15);color:#f59e0b}
.date-inp{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:7px 11px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;color-scheme:dark}
.date-inp::-webkit-calendar-picker-indicator{filter:invert(.6)}
.chip:hover{opacity:.8}
.chip-count{font-size:11px;color:#64748b;margin-left:4px}

.main{padding:16px 16px;max-width:100%;margin:0}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px;width:100%}
.kpi-card{background:#1e293b;border-radius:12px;padding:20px 20px;border-left:4px solid #475569;cursor:pointer;transition:all .15s}
.kpi-card:hover{transform:translateY(-1px)}
.kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:800;color:#f8fafc;margin-bottom:4px;white-space:nowrap}
.kpi-count{font-size:13px;color:#64748b}
.sec{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:20px}
.sec-title{font-size:14px;font-weight:700;color:#f8fafc;margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.rep-card{background:#0f172a;border-radius:12px;padding:14px 16px}

/* Table */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.tb-inp{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:7px 13px;font-size:13px;width:200px;font-family:'Plus Jakarta Sans',sans-serif}
.tb-sel{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:7px 11px;font-size:13px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#64748b;padding:8px 11px;border-bottom:1px solid #334155;cursor:pointer;user-select:none;white-space:nowrap}
.tbl th:hover{color:#94a3b8}
.tbl td{padding:9px 11px;font-size:13px;border-bottom:1px solid #1a2942;color:#cbd5e1}
.tbl tr.selected td{background:#1a2942}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap;border:1px solid}

/* Insights */
.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.ins-grid{grid-template-columns:1fr}}
.bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;font-weight:600;color:#f1f5f9;width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-bg{flex:1;height:8px;background:#0f172a;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-val{font-size:11px;color:#64748b;white-space:nowrap;font-family:'JetBrains Mono',monospace}

/* Distribution bar */
.dist-bar{display:flex;height:34px;border-radius:8px;overflow:hidden;margin-bottom:12px;cursor:pointer}
.dist-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;transition:width .5s}
.legend{display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#94a3b8}
.legend-dot{width:9px;height:9px;border-radius:2px;display:inline-block}

/* Action cards */
.action-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.action-card{background:#0f172a;border-radius:12px;padding:16px}
.action-priority{font-size:10px;font-weight:800;letter-spacing:1.5px;margin-bottom:8px}
.action-title{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:12px;line-height:1.4}
.action-item{display:flex;gap:7px;margin-bottom:7px;font-size:12px;color:#94a3b8}

/* Rep dot */
.rep-dot{display:inline-flex;align-items:center;gap:6px;font-size:12px}
.rep-dot-circle{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Responsive */
@media(max-width:600px){.hdr{flex-direction:column;align-items:flex-start}.main{padding:14px}}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>

// ══════════════════════════════════════════ UTILS ══
function fmt(v) { return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function parseDate(s) {
  if (!s) return null;
  const p = s.split("/");
  if (p.length !== 3) return null;
  return new Date(+p[2], +p[1]-1, +p[0]);
}
function fmtDate(d) {
  if (!d) return "";
  const dd=String(d.getDate()).padStart(2,"0"), mm=String(d.getMonth()+1).padStart(2,"0");
  return dd+"/"+mm+"/"+d.getFullYear();
}
function normDate(raw) {
  if (!raw) return "";
  if (raw instanceof Date) return fmtDate(raw);
  if (typeof raw === "number" && raw > 1000) {
    const d = new Date(Math.round((raw-25569)*86400*1000));
    return String(d.getUTCDate()).padStart(2,"0")+"/"+String(d.getUTCMonth()+1).padStart(2,"0")+"/"+d.getUTCFullYear();
  }
  const s = String(raw).trim();
  const p = s.split("/");
  if (p.length===3 && p[2].length===2) return p[0]+"/"+p[1]+"/20"+p[2];
  return s;
}
function classifyStatus(dtEntrega, today) {
  const dt = parseDate(dtEntrega);
  if (!dt) return "futuro";
  // Parse today as local date to avoid UTC timezone shift
  const tp = today.split("-");
  const t = new Date(+tp[0], +tp[1]-1, +tp[2]); t.setHours(0,0,0,0);
  const endOfWeek = new Date(t); endOfWeek.setDate(t.getDate() + (6-t.getDay()||7));
  const endOfMonth = new Date(t.getFullYear(), t.getMonth()+1, 0);
  if (dt < t) return "atrasado";
  if (dt.toDateString()===t.toDateString()) return "hoje";
  if (dt <= endOfWeek) return "semana";
  if (dt <= endOfMonth) return "mes";
  return "futuro";
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
const repColorMap = {};
function repColor(rep) {
  if (!repColorMap[rep]) { const keys=Object.keys(repColorMap); repColorMap[rep]=REP_COLORS[keys.length%REP_COLORS.length]; }
  return repColorMap[rep];
}

// ══════════════════════════════════════════ PARSE CSV/XLSX USERS ══
async function parseUsers(file) {
  const map = {};
  const ext = file.name.split(".").pop().toLowerCase();
  if (ext==="xlsx"||ext==="xls") {
    const ab = await file.arrayBuffer();
    const wb = XLSX.read(ab,{type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
    if (rows.length<2) return map;
    const hdrs = rows[0].map(h=>String(h||"").trim().toUpperCase());
    const erpCol=hdrs.findIndex(h=>h==="ID_ERP");
    const respCol=hdrs.findIndex(h=>h==="RESPONSAVEL_NEGOCIACAO");
    const criadaCol=hdrs.findIndex(h=>h==="CRIADA_POR");
    if (erpCol===-1) return map;
    for (let i=1;i<rows.length;i++) {
      const row=rows[i];
      const erp=String(row[erpCol]||"");
      const m=erp.match(/PED0+(\d{5})1/);
      if(!m) continue;
      const ped=m[1].padStart(6,"0");
      const resp=String(row[respCol]||"").trim();
      const criada=String(row[criadaCol]||"").trim();
      const user=(resp&&resp!=="None")?resp.replace(/^\d+-/,"").trim():criada;
      if(user&&user!=="Crm Simples"&&user!=="None"&&user!=="") map[ped]=user;
    }
  } else {
    const text = await file.text();
    const lines = text.split(/\r?\n/);;
    const sep = lines[0].includes(";") ? ";" : ",";
    const hdrs = lines[0].split(sep).map(h=>h.trim().toLowerCase());
    const pedCol=hdrs.findIndex(h=>h.includes("numero")||h.includes("pedido"));
    const userCol=hdrs.findIndex(h=>h.includes("usuario")||h.includes("user"));
    if(pedCol!==-1&&userCol!==-1) {
      for(let i=1;i<lines.length;i++){
        const p=lines[i].split(sep);
        if(p.length<=Math.max(pedCol,userCol)) continue;
        const ped=p[pedCol].trim().replace(/^0+/,"").padStart(6,"0");
        const user=p[userCol].trim();
        if(ped&&user&&!/^\d+$/.test(user)) map[ped]=user;
      }
    }
  }
  return map;
}

// ══════════════════════════════════════════ PARSE METHOS XLS ══
async function parseMethos(file, userMap) {
  const ab = await file.arrayBuffer();
  const wb = XLSX.read(ab,{type:"array",cellDates:true,dateNF:"dd/mm/yyyy"});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:"dd/mm/yyyy"});

  let headerIdx = rows.findIndex(r=>r.some(c=>String(c||"").trim()==="Pedido"));
  if(headerIdx===-1) headerIdx=rows.findIndex(r=>r.some(c=>String(c||"").includes("Dt. Ent")||String(c||"").includes("Representante")));
  if(headerIdx===-1) throw new Error("Cabeçalho não encontrado. Verifique se é o Relatório Geral de Movimentos do METHOS C1.");

  const hdrs = rows[headerIdx].map(h=>String(h||"").trim());
  const col = name => hdrs.findIndex(h=>h.includes(name));
  const cPed=col("Pedido"), cEmi=col("Dt Emissão")!==-1?col("Dt Emissão"):col("Emissão");
  const cPes=col("Pessoa"), cRep=col("Representante");
  const cVlr=col("Vlr Mercadoria")!==-1?col("Vlr Mercadoria"):col("Vlr Mercad");
  const cEnt=col("Dt. Ent")!==-1?col("Dt. Ent"):col("Dt Ent");
  if(cPed===-1||cEnt===-1) throw new Error("Colunas não encontradas: "+hdrs.filter(Boolean).join(", "));

  const parsed=[]; let lastPed="",lastCli="",lastRep="",lastEmi="",lastVlr=0;
  for(let r=headerIdx+1;r<rows.length;r++){
    const row=rows[r];
    if(!row||row.every(c=>!c&&c!==0)) continue;
    const pedCell=String(row[cPed]||"").trim();
    const pesCell=String(row[cPes]||"").trim();
    const repCell=String(row[cRep]||"").trim();
    const emiRaw=row[cEmi]; const vlrCell=String(row[cVlr]||"").trim();
    let entCell=row[cEnt];
    if(entCell instanceof Date){const dd=String(entCell.getDate()).padStart(2,"0"),mm=String(entCell.getMonth()+1).padStart(2,"0");entCell=dd+"/"+mm+"/"+entCell.getFullYear();}
    else if(typeof entCell==="number"&&entCell>1000){const d=new Date(Math.round((entCell-25569)*86400*1000));entCell=String(d.getUTCDate()).padStart(2,"0")+"/"+String(d.getUTCMonth()+1).padStart(2,"0")+"/"+d.getUTCFullYear();}
    else entCell=String(entCell||"").trim();

    const isPed=/^\d{5,6}$/.test(pedCell)||/^0\d{5}/.test(pedCell);
    if(isPed){
      lastPed=pedCell.replace(/^0+/,"").padStart(6,"0");
      lastCli=pesCell.replace(/^\d+\s*-\s*/,"").replace(/\.[A-Z]\.[A-Z](\.[A-Z])*.*$/,"").replace(/\s+(LTDA\.?|EIRELI|EPP)\s*$/i,"").trim();
      lastRep=repCell.replace(/^\d+\s*-\s*/,"").replace(/;\d+\s*$/,"").trim()||"INCUBAÇÃO";
      if(emiRaw instanceof Date){const dd=String(emiRaw.getDate()).padStart(2,"0"),mm=String(emiRaw.getMonth()+1).padStart(2,"0");lastEmi=dd+"/"+mm+"/"+emiRaw.getFullYear();}
      else if(typeof emiRaw==="number"&&emiRaw>1000){const d=new Date(Math.round((emiRaw-25569)*86400*1000));lastEmi=String(d.getUTCDate()).padStart(2,"0")+"/"+String(d.getUTCMonth()+1).padStart(2,"0")+"/"+d.getUTCFullYear();}
      else lastEmi=String(emiRaw||"").trim();
      const v=parseFloat(vlrCell.replace(/\./g,"").replace(",","."))||0;
      if(v>0) lastVlr=v;
    }
    if(entCell&&/\d{2}\/\d{2}\/\d{2,4}/.test(entCell)&&lastPed){
      let dt=entCell; const p=dt.split("/"); if(p.length===3&&p[2].length===2) dt=p[0]+"/"+p[1]+"/20"+p[2];
      const v=parseFloat(vlrCell.replace(/\./g,"").replace(",","."))||lastVlr;
      const usuario=userMap[lastPed.replace(/^0+/,"")]||userMap[lastPed]||"";
      if(v>0&&!parsed.find(o=>o.pedido===lastPed&&o.dtEntrega===dt))
        parsed.push({pedido:lastPed,cliente:lastCli,rep:lastRep,dtEmissao:lastEmi,dtEntrega:dt,valor:v,usuario});
    }
  }
  const unique=[]; const seen=new Set();
  for(const o of parsed){if(!seen.has(o.pedido)){seen.add(o.pedido);unique.push(o);}}
  if(unique.length===0) throw new Error("Nenhum pedido encontrado. Verifique se é o Relatório Geral de Movimentos do METHOS C1.");
  return unique;
}

// ══════════════════════════════════════════ DATA HELPERS ══
function getBase(){
  const sel=state.fUsuarios;
  let list=state.orders;
  if(!sel.has("todos")){
    list=list.filter(o=>{
      if(sel.has("__sem__")&&!o.usuario) return true;
      return sel.has(o.usuario);
    });
  }
  // date range filter
  if(state.fDateFrom){
    const from=parseDate(state.fDateFrom.split("-").reverse().join("/"));
    if(from) list=list.filter(o=>{ const d=parseDate(o.dtEntrega); return d&&d>=from; });
  }
  if(state.fDateTo){
    const to=parseDate(state.fDateTo.split("-").reverse().join("/"));
    if(to) list=list.filter(o=>{ const d=parseDate(o.dtEntrega); return d&&d<=to; });
  }
  return list;
}
function getStats(base){
  const out={};
  Object.keys(STATUS_CFG).forEach(s=>{
    const list=base.filter(o=>o.status===s);
    out[s]={count:list.length,total:list.reduce((a,b)=>a+b.valor,0),orders:list};
  });
  return out;
}
function getFiltered(base){
  let list=[...base];
  if(!state.fStatuses.has("todos")) list=list.filter(o=>state.fStatuses.has(o.status));
  if(!state.fReps.has("todos")) list=list.filter(o=>state.fReps.has(o.rep));
  if(state.search){const q=state.search.toLowerCase();list=list.filter(o=>o.cliente.toLowerCase().includes(q)||o.pedido.includes(q));}
  list.sort((a,b)=>{
    if(state.sort==="valor") return b.valor-a.valor;
    if(state.sort==="cliente") return a.cliente.localeCompare(b.cliente);
    return a.dtEntrega.split("/").reverse().join("").localeCompare(b.dtEntrega.split("/").reverse().join(""));
  });
  return list;
}

function sortOrders(orders, status){
  const s = state.cardSort[status] || 'valor';
  return [...orders].sort((a,b)=>{
    if(s==='valor') return b.valor - a.valor;
    if(s==='valora') return a.valor - b.valor;
    if(s==='nome') return a.cliente.localeCompare(b.cliente);
    if(s==='nomez') return b.cliente.localeCompare(a.cliente);
    if(s==='dias'){
      const da=parseDate(a.dtEntrega), db=parseDate(b.dtEntrega);
      return da - db; // mais atrasado primeiro
    }
    if(s==='diasasc'){
      const da=parseDate(a.dtEntrega), db=parseDate(b.dtEntrega);
      return db - da;
    }
    return 0;
  });
}

function nextSort(status, col){
  const cur = state.cardSort[status];
  if(col==='valor') state.cardSort[status] = cur==='valor'?'valora':'valor';
  if(col==='nome')  state.cardSort[status] = cur==='nome'?'nomez':'nome';
  if(col==='dias')  state.cardSort[status] = cur==='dias'?'diasasc':'dias';
  renderAll();
}

function sortArrow(status, col){
  const s = state.cardSort[status];
  if(col==='valor') return s==='valor'?' ↓':s==='valora'?' ↑':' ↕';
  if(col==='nome')  return s==='nome'?' ↑':s==='nomez'?' ↓':' ↕';
  if(col==='dias')  return s==='dias'?' ↓':s==='diasasc'?' ↑':' ↕';
  return ' ↕';
}

}


function hdrBtn(label, status, col, color){
  return `<span onclick="nextSort('${status}','${col}')" style="cursor:pointer;user-select:none;color:${color};font-weight:700;font-size:11px;white-space:nowrap">${label}${sortArrow(status,col)}</span>`;
}

function makeCard(stats, todayForCards, priority, color, title, count, total, status, hasAtraso){
  const itemsHtml = status==='atrasado' ? buildAtrasadosItems(stats, todayForCards) : buildSimpleItems(stats, status);
  const hdrCliente = hdrBtn('Cliente', status, 'nome', '#64748b');
  const hdrValor   = hdrBtn('Valor',   status, 'valor','#64748b');
  const hdrDias    = hasAtraso ? hdrBtn('Atraso', status, 'dias','#64748b') : '';
  return `<div class="action-card">
    <div class="action-priority" style="color:${color}">${priority}</div>
    <div class="action-title">${title}</div>
    <div style="font-size:11px;color:#475569;margin-bottom:8px">${count} pedidos · ${fmt(total)}</div>
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;margin-bottom:4px">
      <colgroup><col style="width:auto"/><col style="width:90px"/>${hasAtraso?'<col style="width:36px"/>':''}</colgroup>
      <tr style="border-bottom:1px solid #334155">
        <td style="font-size:11px;padding-bottom:5px">${hdrCliente}</td>
        <td style="font-size:11px;text-align:right;padding-bottom:5px">${hdrValor}</td>
        ${hasAtraso?`<td style="font-size:11px;text-align:right;padding-bottom:5px;padding-left:8px">${hdrDias}</td>`:''}
      </tr>
    </table>
    ${itemsHtml||`<span style="font-size:12px;color:#475569">Nenhum pedido nesta categoria.</span>`}
  </div>`;
}

function renderDashboard(base,stats,total){
  const statusKeys=Object.keys(STATUS_CFG);
  // KPI cards
  let kpiHtml=statusKeys.map(s=>{
    const c=STATUS_CFG[s];
    return `<div class="kpi-card" style="border-left-color:${c.color}" onclick="setTab('pedidos');state.fStatuses=new Set(['${s}']);renderAll()">
      <div class="kpi-label" style="color:${c.color}">${c.icon} ${c.label}</div>
      <div class="kpi-val mono">${fmt(stats[s]?.total||0)}</div>
      <div class="kpi-count">${stats[s]?.count||0} pedidos</div>
    </div>`;
  }).join("");
  kpiHtml+=`<div class="kpi-card" style="border-left-color:#475569">
    <div class="kpi-label" style="color:#94a3b8">📊 TOTAL</div>
    <div class="kpi-val mono">${fmt(total)}</div>
    <div class="kpi-count">${base.length} pedidos</div>
  </div>`;

  // Rep cards
  const repStats={};
  base.forEach(o=>{
    if(!repStats[o.rep]) repStats[o.rep]={count:0,total:0,atrasado:0};
    repStats[o.rep].count++; repStats[o.rep].total+=o.valor;
    if(o.status==="atrasado") repStats[o.rep].atrasado++;
  });
  const repEntries=Object.entries(repStats).sort((a,b)=>b[1].total-a[1].total);
  const repCards=repEntries.map(([rep,d])=>{
    const pct=total>0?(d.total/total*100):0;
    const col=repColor(rep);
    return `<div class="rep-card" onclick="setTab('pedidos');state.fRep='${esc(rep)}';state.fStatuses=new Set(['todos']);renderAll()" style="cursor:pointer;transition:background .15s" onmouseover="this.style.background='#162032'" onmouseout="this.style.background=''">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div class="rep-dot" style="font-size:11px;font-weight:800;color:${col};letter-spacing:.5px"><span class="rep-dot-circle" style="background:${col}"></span>${esc(rep)}</div>
        <span style="font-size:11px;color:#475569">${pct.toFixed(1)}%</span>
      </div>
      <div style="font-size:17px;font-weight:800;color:#f8fafc;font-family:'JetBrains Mono',monospace;margin-bottom:2px">${fmt(d.total)}</div>
      <div style="font-size:11px;color:#64748b;margin-bottom:8px">${d.count} pedidos${d.atrasado?` <span style="color:#ef4444;font-weight:700">⚠ ${d.atrasado} atrasados</span>`:""}</div>
      <div style="height:3px;background:#0f172a;border-radius:2px"><div style="height:100%;width:${pct}%;background:${col};border-radius:2px"></div></div>
    </div>`;
  }).join("");

  // Action cards
  const todayForCards = new Date(state.today);

  // Sort state per card
  const actions = [
    makeCard(stats,todayForCards,"URGENTE","#ef4444","Regularizar atrasados",(stats.atrasado?.orders||[]).length,stats.atrasado?.total||0,'atrasado',true),
    makeCard(stats,todayForCards,"HOJE","#f59e0b","Faturar hoje",(stats.hoje?.orders||[]).length,stats.hoje?.total||0,'hoje',false),
    makeCard(stats,todayForCards,"SEMANA","#3b82f6","Preparar logística",(stats.semana?.orders||[]).length,stats.semana?.total||0,'semana',false),
  ].join("");

  document.getElementById("tab-dashboard").innerHTML=`
    <div class="kpi-grid">${kpiHtml}</div>
    <div class="sec"><div class="sec-title">👤 Por Representante</div><div class="rep-grid">${repCards}</div></div>
    <div class="sec"><div class="sec-title">⚡ Ações Prioritárias</div><div class="action-grid">${actions}</div></div>`;
}

function renderPedidos(base,stats,reps,hasU,todayDate){
  const filtered=getFiltered(base);
  const hasActive=!state.fStatuses.has("todos")||!state.fReps.has("todos")||state.search||!state.fUsuarios.has("todos")||state.fDateFrom||state.fDateTo;
  const toolbar=`<div class="toolbar">
    <input class="tb-inp" placeholder="🔍 Cliente ou pedido…" value="${esc(state.search)}" oninput="state.search=this.value;renderAll()"/>
    <div style="position:relative;display:inline-block">
      <button onclick="toggleStatusMenu()" id="status-btn"
        style="background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:7px 11px;font-size:13px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;gap:6px;white-space:nowrap">
        ${state.fStatuses.has("todos") ? "Todos os status" : [...state.fStatuses].map(s=>STATUS_CFG[s]?.icon).join(" ")+" ("+state.fStatuses.size+")"} ▾
      </button>
      <div id="status-menu" style="display:none;position:absolute;top:110%;left:0;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:8px;z-index:200;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.5)">
        <label style="display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:6px;font-size:13px;color:#94a3b8" onmouseover="this.style.background='#0f172a'" onmouseout="this.style.background=''">
          <input type="checkbox" ${state.fStatuses.has("todos")?"checked":""} onchange="toggleStatusFilter('todos',this.checked)" style="cursor:pointer"/> Todos
        </label>
        ${Object.entries(STATUS_CFG).map(([k,v])=>`
        <label style="display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:6px;font-size:13px;color:${v.color}" onmouseover="this.style.background='#0f172a'" onmouseout="this.style.background=''">
          <input type="checkbox" ${!state.fStatuses.has("todos")&&state.fStatuses.has(k)?"checked":""} onchange="toggleStatusFilter('${k}',this.checked)" style="cursor:pointer"/> ${v.icon} ${v.label}
        </label>`).join("")}
      </div>
    </div>
    <div style="position:relative;display:inline-block">
      <button onclick="toggleRepMenu()" id="rep-btn"
        style="background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:7px 11px;font-size:13px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;gap:6px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis">
        ${state.fReps.has("todos") ? "Todos os representantes" : ([...state.fReps].length===1 ? esc([...state.fReps][0]) : [...state.fReps].length+" representantes")} ▾
      </button>
      <div id="rep-menu" style="display:none;position:absolute;top:110%;left:0;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:8px;z-index:200;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.5)">
        <label style="display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:6px;font-size:13px;color:#94a3b8" onmouseover="this.style.background='#0f172a'" onmouseout="this.style.background=''">
          <input type="checkbox" ${state.fReps.has("todos")?"checked":""} onchange="toggleRepFilter('todos',this.checked)" style="cursor:pointer"/> Todos
        </label>
        ${reps.map(r=>`
        <label style="display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:6px;font-size:13px;color:#f1f5f9" onmouseover="this.style.background='#0f172a'" onmouseout="this.style.background=''">
          <input type="checkbox" ${!state.fReps.has("todos")&&state.fReps.has(r)?"checked":""} onchange="toggleRepFilter('${esc(r)}',this.checked)" style="cursor:pointer"/>
          <span class="rep-dot"><span class="rep-dot-circle" style="background:${repColor(r)}"></span>${esc(r)}</span>
        </label>`).join("")}
      </div>
    </div>
    <select class="tb-sel" onchange="state.sort=this.value;renderAll()">
      <option value="dtEntrega" ${state.sort==="dtEntrega"?"selected":""}>Data Entrega</option>
      <option value="valor" ${state.sort==="valor"?"selected":""}>Maior Valor</option>
      <option value="cliente" ${state.sort==="cliente"?"selected":""}>Cliente A-Z</option>
    </select>
    <div style="display:flex;align-items:center;gap:6px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:4px 10px">
      <span style="font-size:11px;color:#475569;white-space:nowrap">📅 Entrega</span>
      <input type="date" class="date-inp" style="border:none;background:transparent;padding:3px 0" value="${state.fDateFrom}" onchange="state.fDateFrom=this.value;renderAll()" title="De"/>
      <span style="color:#334155">—</span>
      <input type="date" class="date-inp" style="border:none;background:transparent;padding:3px 0" value="${state.fDateTo}" onchange="state.fDateTo=this.value;renderAll()" title="Até"/>
      ${state.fDateFrom||state.fDateTo?`<button onclick="state.fDateFrom='';state.fDateTo='';renderAll()" style="background:none;border:none;color:#475569;cursor:pointer;font-size:13px;padding:0 0 0 4px">✕</button>`:""}
    </div>
    ${hasActive?`<button class="btn" onclick="state.fStatuses=new Set(['todos']);state.fReps=new Set(['todos']);state.search='';state.fDateFrom='';state.fDateTo='';renderAll()">✕ Limpar</button>`:""}
  </div>`;

  const hasUsuarios=hasU;
  const rows=filtered.map(o=>{
    const dt=parseDate(o.dtEntrega);
    const dias=o.status==="atrasado"?Math.floor((todayDate-dt)/86400000):null;
    const c=STATUS_CFG[o.status];
    const sel=state.sel.has(o.pedido);
    return `<tr class="${sel?"selected":""}" style="cursor:pointer" onclick="toggleSel('${o.pedido}')">
      <td class="tbl td"><input type="checkbox" ${sel?"checked":""} onclick="event.stopPropagation();toggleSel('${o.pedido}')" style="cursor:pointer"/></td>
      <td class="tbl td mono" style="font-weight:700;color:#f8fafc;font-size:12px">${esc(o.pedido)}</td>
      <td class="tbl td" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${esc(o.cliente)}</td>
      <td class="tbl td" style="white-space:nowrap"><span class="rep-dot"><span class="rep-dot-circle" style="background:${repColor(o.rep)}"></span>${esc(o.rep)}</span></td>
      ${hasUsuarios?`<td class="tbl td" style="font-size:11px;color:#60a5fa;white-space:nowrap">${esc(o.usuario)||'<span style="color:#334155">—</span>'}</td>`:""}
      <td class="tbl td mono" style="color:#64748b;font-size:12px">${esc(o.dtEmissao)}</td>
      <td class="tbl td mono" style="font-size:12px;color:${o.status==="atrasado"?"#ef4444":"#f1f5f9"};font-weight:${o.status==="atrasado"?700:400}">${esc(o.dtEntrega)}</td>
      <td class="tbl td">${dias!==null?`<span class="mono" style="color:#ef4444;font-weight:700;font-size:12px">${dias}d</span>`:""}</td>
      <td class="tbl td mono" style="font-weight:700;color:#f8fafc;font-size:12px">${fmt(o.valor)}</td>
      <td class="tbl td"><span class="badge" style="background:${c.bg};color:${c.color};border-color:${c.border}">${c.icon} ${c.label}</span></td>
    </tr>`;
  }).join("");

  const allChecked=filtered.length>0&&filtered.every(o=>state.sel.has(o.pedido));
  window._filteredPeds=filtered.map(o=>o.pedido);
  document.getElementById("tab-pedidos").innerHTML=`<div class="sec">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="sec-title" style="margin-bottom:0">📋 Pedidos</div>
      <div style="font-size:13px;color:#64748b">${filtered.length} pedidos · ${fmt(filtered.reduce((a,b)=>a+b.valor,0))}${state.sel.size>0?` <span style="color:#f59e0b;margin-left:10px">${state.sel.size} selecionados</span>`:""}</div>
    </div>
    ${toolbar}
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr>
        <th><input type="checkbox" ${allChecked?"checked":""} onchange="selAll(this.checked,window._filteredPeds)" style="cursor:pointer"/></th>
        <th onclick="state.sort='dtEntrega';renderAll()">Pedido</th>
        <th onclick="state.sort='cliente';renderAll()">Cliente ↕</th>
        <th>Representante</th>
        ${hasUsuarios?"<th>Usuário</th>":""}
        <th>Dt Emissão</th><th>Dt Entrega</th><th>Atraso</th>
        <th onclick="state.sort='valor';renderAll()">Valor ↕</th>
        <th>Status</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

function renderInsights(base,stats,total,todayDate){
  // Top clientes
  const cliMap={};
  base.forEach(o=>{ if(!cliMap[o.cliente]) cliMap[o.cliente]={total:0,count:0}; cliMap[o.cliente].total+=o.valor; cliMap[o.cliente].count++; });
  const topCli=Object.entries(cliMap).sort((a,b)=>b[1].total-a[1].total).slice(0,10);
  const maxCli=topCli[0]?.[1].total||1;
  const cliHtml=topCli.map(([cli,d],i)=>`<div class="bar-wrap">
    <div class="bar-label">${esc(cli)}</div>
    <div class="bar-bg"><div class="bar-fill" style="width:${d.total/maxCli*100}%;background:${REP_COLORS[i%REP_COLORS.length]}"></div></div>
    <div class="bar-val">${fmt(d.total)}</div>
  </div>`).join("");

  // Top reps
  const repMap={};
  base.forEach(o=>{ if(!repMap[o.rep]) repMap[o.rep]={total:0,count:0,atrasado:0}; repMap[o.rep].total+=o.valor; repMap[o.rep].count++; if(o.status==="atrasado") repMap[o.rep].atrasado++; });
  const topRep=Object.entries(repMap).sort((a,b)=>b[1].total-a[1].total);
  const maxRep=topRep[0]?.[1].total||1;
  const repHtml=topRep.map(([rep,d])=>`<div class="bar-wrap">
    <div class="bar-label"><span class="rep-dot"><span class="rep-dot-circle" style="background:${repColor(rep)}"></span>${esc(rep)}</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${d.total/maxRep*100}%;background:${repColor(rep)}"></div></div>
    <div class="bar-val">${fmt(d.total)}</div>
  </div>`).join("");

  // Vencimentos próximos
  const now=new Date(state.today);
  const next30=base.filter(o=>{ const dt=parseDate(o.dtEntrega); return dt&&dt>=now; }).sort((a,b)=>parseDate(a.dtEntrega)-parseDate(b.dtEntrega)).slice(0,8);
  const nextHtml=next30.map(o=>{
    const c=STATUS_CFG[o.status];
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2942">
      <div><div style="font-size:12px;font-weight:700;color:#f1f5f9">${esc(o.cliente.slice(0,35))}</div><div style="font-size:11px;color:#64748b">Ped. ${esc(o.pedido)} · ${esc(o.rep)}</div></div>
      <div style="text-align:right"><div style="font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#f8fafc">${fmt(o.valor)}</div><span class="badge" style="background:${c.bg};color:${c.color};border-color:${c.border};font-size:10px">${c.icon} ${esc(o.dtEntrega)}</span></div>
    </div>`;
  }).join("");

  document.getElementById("tab-insights").innerHTML=`
    <div class="ins-grid">
      <div class="sec"><div class="sec-title">🏆 Top Clientes por Valor</div>${cliHtml}</div>
      <div class="sec"><div class="sec-title">👤 Desempenho por Representante</div>${repHtml}</div>
    </div>
    <div class="sec"><div class="sec-title">📅 Próximos Vencimentos</div>${nextHtml}</div>`;
}

// ══════════════════════════════════════════ INTERACTIONS ══
function setTab(t){
  state.tab=t;
  ["dashboard","pedidos","insights"].forEach(id=>{
    document.getElementById("tab-"+id).style.display=id===t?"block":"none";
    document.getElementById("nav-"+id).classList.toggle("active",id===t);
  });
}
function toggleSel(ped){
  if(state.sel.has(ped)) state.sel.delete(ped); else state.sel.add(ped);
  renderPedidos(getBase(),getStats(getBase()),[...new Set(getBase().map(o=>o.rep))],state.orders.some(o=>o.usuario),new Date(state.today));
}
function selAll(checked,peds){
  if(checked) peds.forEach(p=>state.sel.add(p)); else state.sel.clear();
  renderPedidos(getBase(),getStats(getBase()),[...new Set(getBase().map(o=>o.rep))],state.orders.some(o=>o.usuario),new Date(state.today));
}

// ══════════════════════════════════════════ EXPORT ══
function exportXLSX(list, name){
  const today=state.today;
  const todayDate=new Date(today);
  const rows=list.map(o=>{
    const dt=parseDate(o.dtEntrega);
    const dias=o.status==="atrasado"?Math.floor((todayDate-dt)/86400000):"";
    return {"Pedido":o.pedido,"Cliente":o.cliente,"Representante":o.rep,"Dt Emissao":o.dtEmissao,"Dt Entrega":o.dtEntrega,"Dias Atraso":dias===""?"":Number(dias),"Valor":o.valor,"Status":STATUS_CFG[o.status]?.label||o.status,"Usuario":o.usuario||"","Acao Necessaria":""};
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[{wch:10},{wch:40},{wch:26},{wch:13},{wch:13},{wch:13},{wch:14},{wch:16},{wch:16},{wch:28}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Pedidos");
  XLSX.writeFile(wb,name);
}
function exportAtrasados(){
  const base=getBase();
  exportXLSX(base.filter(o=>o.status==="atrasado"),`atrasados_${state.today}.xlsx`);
}
function exportView(){
  const base=getBase();
  const list=state.sel.size>0?base.filter(o=>state.sel.has(o.pedido)):getFiltered(base);
  exportXLSX(list,`pedidos_${state.today}.xlsx`);
}
</script>
</body>
